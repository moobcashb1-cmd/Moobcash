<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفع CIH Bank | MOBCASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Kufi Arabic', sans-serif; 
            background-color: #ffffff; 
            margin: 0;
            overflow-x: hidden;
        }

        .toolbar { 
            background: white; 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
        }
        .header-title { font-size: 18px; font-weight: 900; color: #1e293b; }
        .back-btn { font-size: 24px; color: #64748b; cursor: pointer; text-decoration: none; }

        /* البطاقة الرمادية المطلوبة */
        .amount-info-card {
            background-color: #f1f3f6; 
            border-radius: 1.5rem; 
            padding: 25px 20px;
            margin: 20px auto;
            text-align: center;
            max-width: 92%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .amount-text {
            font-size: 34px; 
            font-weight: 900;
            color: #0f172a;
        }

        .account-id-text {
            font-size: 13px; 
            color: #64748b;
            font-weight: 500;
        }

        .id-number {
            font-weight: 800;
            color: #0f172a;
        }

        /* حاوية معلومات التحويل */
        .transfer-details {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            border-radius: 1.2rem;
            padding: 20px;
            margin: 10px auto;
            max-width: 92%;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .info-row:last-child { margin-bottom: 0; }

        .label { font-size: 12px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 4px; }
        .value { font-size: 14px; font-weight: 800; color: #1e293b; }

        .copy-btn {
            background: #f1f5f9;
            color: #475569;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            border: none;
        }

        .confirm-btn {
            background: #1e293b;
            color: white;
            width: 92%;
            padding: 18px;
            border-radius: 1rem;
            font-weight: 900;
            font-size: 15px;
            margin: 20px auto;
            display: block;
            text-align: center;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body class="antialiased">

    <div class="toolbar">
        <a href="javascript:history.back()" class="back-btn">←</a>
        <h1 class="header-title">الدفع عبر CIH Bank</h1>
        <div style="width: 24px;"></div>
    </div>

    <main class="max-w-[500px] mx-auto">
        
        <div class="flex justify-center mt-6">
            <img src="https://i.postimg.cc/rzQLyTX1/cih.png" class="h-10 object-contain">
        </div>

        <div class="amount-info-card">
            <span class="amount-text" id="displayAmount">MAD 0.00</span>
            <div class="account-id-text">
                Top up your account <span class="id-number" id="displayID">ID 00000000</span>
            </div>
        </div>

        <div class="transfer-details">
            <div class="info-row">
                <div>
                    <span class="label">اسم المستفيد</span>
                    <span class="value" id="holderName">MOHAMED *******</span>
                </div>
                <button class="copy-btn" onclick="copyText('MOHAMED *******')">نسخ</button>
            </div>
            
            <hr class="my-3 border-gray-50">

            <div class="info-row">
                <div>
                    <span class="label">رقم الحساب (RIB)</span>
                    <span class="value" id="ribNumber">230 780 0000000000000000 00</span>
                </div>
                <button class="copy-btn" onclick="copyText('230780000000000000000000')">نسخ</button>
            </div>
        </div>

        <p class="text-center text-gray-400 mt-4 text-[11px] font-bold px-8">
            يرجى إرسال المبلغ المكتوب أعلاه إلى هذا الحساب، ثم اضغط على زر التأكيد أسفله.
        </p>

        <button class="confirm-btn uppercase tracking-wider">
            أرسلت المبلغ، تأكيد
        </button>

    </main>

    <script>
        // كود قراءة البيانات من الرابط (URL)
        const params = new URLSearchParams(window.location.search);
        const amount = params.get('amount');
        const userId = params.get('id');

        // تحديث البطاقة الرمادية
        if (amount) {
            document.getElementById('displayAmount').innerText = `MAD ${parseFloat(amount).toFixed(2)}`;
        }
        if (userId) {
            document.getElementById('displayID').innerText = `ID ${userId}`;
        }

        // دالة النسخ
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("تم النسخ بنجاح");
            });
        }
    </script>
</body>
</html>
