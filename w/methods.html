<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيداع | MOBCASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Kufi Arabic', sans-serif; 
            background-color: #ffffff; 
            margin: 0;
            padding-top: 10px;
        }

        .toolbar { 
            background: white; 
            padding: 10px 25px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }
        .header-title { font-size: 24px; font-weight: 900; }
        .close-btn { font-size: 26px; color: #cbd5e1; cursor: pointer; }

        .method-card { 
            background: #f1f3f6; 
            border-radius: 1.2rem; 
            display: flex;
            align-items: center;
            justify-content: flex-end; 
            padding: 15px;
            height: 105px; 
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .method-card:active { transform: scale(0.96); }
        
        .bank-content {
            display: flex;
            flex-direction: column; 
            align-items: center; 
            gap: 6px;
            min-width: 90px;
        }

        .icon-container {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-img { 
            max-height: 100%;
            width: auto;
            object-fit: contain;
        }
        
        .bank-name {
            font-size: 11px;
            font-weight: 800;
            color: #1a1a1a;
            white-space: nowrap;
            text-align: center;
        }
    </style>
</head>
<body class="antialiased">

    <div class="toolbar">
        <span class="close-btn" onclick="if(window.parent.closeSheet) window.parent.closeSheet();">✕</span>
        <h1 class="header-title">إيداع</h1>
    </div>

    <main class="max-w-[500px] mx-auto px-4 mt-4 pb-10">
        <div class="grid grid-cols-2 gap-3">
            
            <div onclick="goToPayment('recharge_id')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/gnfj6Pp4/recharge-id.png" class="icon-img"></div>
                    <span class="bank-name">Recharge par ID</span>
                </div>
            </div>

            <div onclick="goToPayment('cih')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/rzQLyTX1/cih.png" class="icon-img"></div>
                    <span class="bank-name">CIH Bank</span>
                </div>
            </div>

            <div onclick="goToPayment('cashplus')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/VSyxZLnb/cash-plus.png" class="icon-img"></div>
                    <span class="bank-name">Cash Plus</span>
                </div>
            </div>

            <div onclick="goToPayment('tijari')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/CRFdSs4F/tijari.png" class="icon-img"></div>
                    <span class="bank-name">Attijari Bank</span>
                </div>
            </div>

            <div onclick="goToPayment('barid')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/bdCmQmsR/barid.png" class="icon-img"></div>
                    <span class="bank-name">Al Barid Bank</span>
                </div>
            </div>

            <div onclick="goToPayment('baridpay')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/rK9Fnt2x/barid-pay.png" class="icon-img"></div>
                    <span class="bank-name">Barid Pay</span>
                </div>
            </div>

            <div onclick="goToPayment('lbankalik')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/hhCHW0VF/lbankalik.png" class="icon-img"></div>
                    <span class="bank-name">Lbanka lik</span>
                </div>
            </div>

            <div onclick="goToPayment('boa')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/xky4sG0V/boa.png" class="icon-img"></div>
                    <span class="bank-name">Bank Of Africa</span>
                </div>
            </div>

            <div onclick="goToPayment('chaabipay')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/yWyHs4pB/chaabi-pay.png" class="icon-img"></div>
                    <span class="bank-name">Chaabi Pay</span>
                </div>
            </div>

            <div onclick="goToPayment('chaabi')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/v45qB7xy/chaabi.png" class="icon-img"></div>
                    <span class="bank-name">Banque Populaire</span>
                </div>
            </div>

            <div onclick="goToPayment('damane')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/QFZmRBYx/damane.png" class="icon-img"></div>
                    <span class="bank-name">Damane Pay</span>
                </div>
            </div>

            <div onclick="goToPayment('orange')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/d7yxNvNn/orange.png" class="icon-img"></div>
                    <span class="bank-name">Orange Money</span>
                </div>
            </div>

            <div onclick="goToPayment('inwi')" class="method-card">
                <div class="bank-content">
                    <div class="icon-container"><img src="https://i.postimg.cc/QHK1TtF6/inwi.png" class="icon-img"></div>
                    <span class="bank-name">Inwi Money</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        function goToPayment(pageName) {
            // جلب البيانات القادمة من index.html
            const urlParams = new URLSearchParams(window.location.search);
            const amount = urlParams.get('amount') || '';
            const userId = urlParams.get('id') || '';

            // التوجيه لصفحة البنك الخاصة (مثلاً cih.html) مع تمرير البيانات
            window.location.href = `${pageName}.html?amount=${amount}&id=${userId}`;
        }
    </script>
</body>
</html>
