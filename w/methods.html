<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيداع | MOBCASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Kufi Arabic', sans-serif; 
            background-color: #f7f7f9; 
            color: #1a1a1a;
            margin: 0; padding: 0;
        }
        
        .method-card { 
            background: white; 
            border-radius: 1.2rem; 
            transition: all 0.2s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: row-reverse; 
            align-items: center;
            justify-content: flex-start;
            padding: 12px 15px;
            height: 85px; /* حجم كبير وواضح */
            gap: 12px;
        }
        
        .method-card:active { transform: scale(0.95); background: #f0f0f0; }
        
        .icon-img { 
            width: 45px; /* أيقونات كبيرة */
            height: 45px;
            object-fit: contain; 
            flex-shrink: 0;
        }
        
        .bank-name {
            font-size: 13px; /* خط واضح وكبير */
            font-weight: 700;
            color: #333;
            text-align: right;
            line-height: 1.3;
        }

        .section-header {
            font-size: 16px;
            font-weight: 800;
            color: #1a1a1a;
            margin: 25px 5px 15px 0;
            display: block;
        }

        .toolbar { 
            background: white; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 50;
        }
        .header-title { font-size: 20px; font-weight: 800; }
        .close-btn { font-size: 24px; color: #999; cursor: pointer; }
    </style>
</head>
<body class="antialiased">

    <div class="toolbar">
        <span class="close-btn" onclick="window.parent.closeSheet()">✕</span>
        <h1 class="header-title">إيداع</h1>
    </div>

    <main class="max-w-[500px] mx-auto px-4 pb-10">
        
        <span class="section-header">تطبيقات بنكية</span>
        <div class="grid grid-cols-2 gap-4">
            <div onclick="goToPayment('cih')" class="method-card">
                <img src="https://i.postimg.cc/HjwnkGv2/cih.png" class="icon-img">
                <span class="bank-name">CIH Bank</span>
            </div>
            <div onclick="goToPayment('chaabi')" class="method-card">
                <img src="https://i.postimg.cc/PPyvgwvB/chaabi.png" class="icon-img">
                <span class="bank-name">الشعبي</span>
            </div>
        </div>

        <span class="section-header">محافظ إلكترونية</span>
        <div class="grid grid-cols-2 gap-4">
            <div onclick="goToPayment('orange')" class="method-card">
                <img src="https://i.postimg.cc/d7yxNvNn/orange.png" class="icon-img">
                <span class="bank-name">Orange</span>
            </div>
            <div onclick="goToPayment('inwi')" class="method-card">
                <img src="https://i.postimg.cc/QHK1TtF6/inwi.png" class="icon-img">
                <span class="bank-name">Inwi</span>
            </div>
        </div>

        </main>

    <script>
        function goToPayment(method) {
            window.location.href = 'payment.html?method=' + method;
        }
    </script>
</body>
</html>
